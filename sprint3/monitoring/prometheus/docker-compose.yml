version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: always
    depends_on:
      - node-exporter
      - blackbox-exporter
    networks:
      - monitoring-network

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    restart: always
    networks:
      - monitoring-network

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: always
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: always
    networks:
      - monitoring-network
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.mail.ru:465
      - GF_SMTP_USER=<email>
      - GF_SMTP_PASSWORD=<password>
      - GF_SMTP_FROM_ADDRESS=<email>
      - GF_SMTP_FROM_NAME=Grafana Monitoring srv
volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring-network:
    external: true
